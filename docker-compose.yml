services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ptk_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    networks:
      - ptk_net

  nginx:
    image: nginx:1.25-alpine
    container_name: ptk_nginx
    restart: unless-stopped
    ports:
      - "1000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ptk_net

  db:
    image: mysql:8.0
    container_name: ptk_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ptk_tracker
      MYSQL_USER: ptk_user
      MYSQL_PASSWORD: ptk_pass
    volumes:
      - ptk_db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - ptk_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    container_name: ptk_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ptk_user
      PMA_PASSWORD: ptk_pass
    depends_on:
      - db
    networks:
      - ptk_net

networks:
  ptk_net:
    driver: bridge

volumes:
  ptk_db_data:
